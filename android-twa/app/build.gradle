plugins {
    id 'com.android.application'
}

android {
    namespace 'com.paulwebster44.teleprompter'
    compileSdk 35

    defaultConfig {
        applicationId 'com.paulwebster44.teleprompter'
        minSdk 21
        targetSdk 35
        versionCode 10
        versionName '1.3'
    }

    signingConfigs {
        release {
            storeFile     file(System.getenv('KEYSTORE_PATH') ?: 'teleprompter-upload.keystore')
            storePassword System.getenv('KEYSTORE_PASSWORD') ?: ''
            keyAlias      System.getenv('KEY_ALIAS')         ?: 'teleprompter'
            keyPassword   System.getenv('KEY_PASSWORD')      ?: ''
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.release
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
}
